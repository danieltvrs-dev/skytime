<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dashboard de clima com tempo agora, previsão dos próximos dias e localização automática." />
    <meta name="theme-color" content="#0A4DA3" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph: define como Skytime aparece quando compartilhado
         em WhatsApp, Twitter, LinkedIn, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Skytime" />
    <meta property="og:description" content="Dashboard de clima com tempo agora, previsão dos próximos dias e localização automática." />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Skytime" />

    <!-- Twitter Card: o equivalente do Twitter/X. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Skytime" />
    <meta name="twitter:description" content="Dashboard de clima com tempo agora, previsão dos próximos dias e localização automática." />
    <meta name="twitter:image" content="/og-image.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Inter:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <title>Skytime</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
