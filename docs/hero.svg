<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" font-family="Outfit, Inter, system-ui, sans-serif">
  <!-- Fundo paper -->
  <rect width="1400" height="560" fill="#F7F4EE"/>

  <!-- ============================================ -->
  <!-- BROWSER MOCKUP À ESQUERDA                    -->
  <!-- ============================================ -->
  <g transform="translate(70, 90)">
    <!-- Sombra suave -->
    <rect x="0" y="6" width="820" height="380" rx="14" fill="#0B1B3D" opacity="0.08"/>
    <!-- Janela do browser -->
    <rect width="820" height="380" rx="14" fill="#FFFFFF" stroke="#E6E1D6" stroke-width="1"/>

    <!-- Chrome (header) -->
    <rect width="820" height="50" rx="14" fill="#EDEAE2"/>
    <rect y="38" width="820" height="12" fill="#EDEAE2"/>

    <!-- Traffic lights -->
    <circle cx="22" cy="25" r="5.5" fill="#D5CFC0"/>
    <circle cx="40" cy="25" r="5.5" fill="#D5CFC0"/>
    <circle cx="58" cy="25" r="5.5" fill="#D5CFC0"/>

    <!-- Tab skytime.app -->
    <g transform="translate(95, 12)">
      <path d="M0 38 L0 8 Q0 0 8 0 L150 0 Q158 0 158 8 L158 38 Z" fill="#FFFFFF" stroke="#E6E1D6" stroke-width="1"/>
      <!-- Mini favicon dentro da tab -->
      <g transform="translate(14, 11) scale(0.2)">
        <rect width="80" height="80" rx="16" fill="#0A4DA3"/>
        <path d="M22 52 Q14 52 14 44 Q14 36 24 36 Q26 26 38 26 Q50 26 52 36 Q62 36 62 44 Q62 52 56 52 Z" fill="#F7F4EE"/>
        <circle cx="60" cy="24" r="7" fill="#F7F4EE"/>
        <line x1="37" y1="42" x2="37" y2="34" stroke="#0A4DA3" stroke-width="2.6" stroke-linecap="round"/>
        <line x1="37" y1="42" x2="44" y2="45" stroke="#0A4DA3" stroke-width="2.6" stroke-linecap="round"/>
        <circle cx="37" cy="42" r="1.7" fill="#0A4DA3"/>
      </g>
      <text x="42" y="26" font-size="14" fill="#2A3346">skytime.app</text>
    </g>

    <!-- Conteúdo do browser -->
    <g transform="translate(56, 80)">
      <!-- Lockup: tile + wordmark -->
      <g>
        <!-- Tile do logo -->
        <rect width="56" height="56" rx="13" fill="#0A4DA3"/>
        <g transform="translate(0, 0) scale(0.7)">
          <path d="M22 52 Q14 52 14 44 Q14 36 24 36 Q26 26 38 26 Q50 26 52 36 Q62 36 62 44 Q62 52 56 52 Z" fill="#F7F4EE"/>
          <circle cx="60" cy="24" r="7" fill="#F7F4EE"/>
          <line x1="37" y1="42" x2="37" y2="34" stroke="#0A4DA3" stroke-width="2.6" stroke-linecap="round"/>
          <line x1="37" y1="42" x2="44" y2="45" stroke="#0A4DA3" stroke-width="2.6" stroke-linecap="round"/>
          <circle cx="37" cy="42" r="1.7" fill="#0A4DA3"/>
        </g>
      </g>
      <!-- Wordmark "skytime" -->
      <text x="74" y="42" font-size="38" font-weight="600" fill="#0A4DA3" letter-spacing="-1.5">skytime</text>

      <!-- Links de nav -->
      <text x="500" y="36" font-size="15" font-weight="500" fill="#2A3346">Mapa</text>
      <text x="560" y="36" font-size="15" font-weight="500" fill="#2A3346">Hoje</text>

      <!-- Botão Entrar -->
      <rect x="620" y="18" width="80" height="32" rx="16" fill="#0A4DA3"/>
      <text x="660" y="38" font-size="14" font-weight="500" fill="#FFFFFF" text-anchor="middle">Entrar</text>

      <!-- Tagline editorial em serif -->
      <text x="0" y="140" font-family="Fraunces, Georgia, serif" font-size="50" font-weight="600" fill="#0E1421" letter-spacing="-1.5">Seu céu,</text>
      <text x="0" y="195" font-family="Fraunces, Georgia, serif" font-size="50" font-weight="600" fill="#0E1421" letter-spacing="-1.5">minuto a minuto.</text>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- PHONE MOCKUP À DIREITA                        -->
  <!-- ============================================ -->
  <g transform="translate(990, 65)">
    <!-- Sombra -->
    <rect x="6" y="12" width="280" height="440" rx="42" fill="#0B1B3D" opacity="0.18"/>
    <!-- Frame do phone (borda escura) -->
    <rect width="280" height="440" rx="42" fill="#1a2547"/>
    <!-- Tela navy gradient -->
    <rect x="6" y="6" width="268" height="428" rx="36" fill="#0F1B36"/>

    <!-- Notch -->
    <rect x="100" y="6" width="80" height="22" rx="0 0 14 14" fill="#000"/>
    <path d="M100 6 L180 6 L180 20 Q180 28 172 28 L108 28 Q100 28 100 20 Z" fill="#000"/>

    <!-- Status bar -->
    <text x="26" y="48" font-size="11" font-weight="600" fill="#FFFFFF">9:41</text>
    <g fill="#FFFFFF" transform="translate(232, 42)">
      <rect width="6" height="8" rx="1"/>
      <rect x="10" width="6" height="8" rx="1"/>
      <rect x="20" width="6" height="8" rx="1"/>
    </g>

    <!-- Grade de apps placeholder -->
    <g fill="#FFFFFF" opacity="0.18">
      <rect x="26" y="80" width="44" height="44" rx="11"/>
      <rect x="86" y="80" width="44" height="44" rx="11"/>
      <rect x="146" y="80" width="44" height="44" rx="11"/>
      <rect x="206" y="80" width="44" height="44" rx="11"/>
      <rect x="26" y="148" width="44" height="44" rx="11"/>
      <rect x="146" y="148" width="44" height="44" rx="11"/>
      <rect x="206" y="148" width="44" height="44" rx="11"/>
      <rect x="26" y="216" width="44" height="44" rx="11"/>
      <rect x="146" y="216" width="44" height="44" rx="11"/>
      <rect x="206" y="216" width="44" height="44" rx="11"/>
    </g>

    <!-- App icon Skytime em destaque -->
    <g transform="translate(86, 148)">
      <rect width="44" height="44" rx="11" fill="#0A4DA3"/>
      <g transform="translate(0, 0) scale(0.55)">
        <path d="M22 52 Q14 52 14 44 Q14 36 24 36 Q26 26 38 26 Q50 26 52 36 Q62 36 62 44 Q62 52 56 52 Z" fill="#F7F4EE"/>
        <circle cx="60" cy="24" r="7" fill="#F7F4EE"/>
        <line x1="37" y1="42" x2="37" y2="34" stroke="#0A4DA3" stroke-width="2.6" stroke-linecap="round"/>
        <line x1="37" y1="42" x2="44" y2="45" stroke="#0A4DA3" stroke-width="2.6" stroke-linecap="round"/>
        <circle cx="37" cy="42" r="1.7" fill="#0A4DA3"/>
      </g>
      <text x="22" y="60" font-size="9" font-weight="700" fill="#F9A03F" text-anchor="middle">Skytime</text>
    </g>
  </g>

  <!-- Tag inferior estilo metadata -->
  <text x="700" y="525" font-size="11" font-weight="500" fill="#6B7385" letter-spacing="3" text-anchor="middle">SKYTIME · PREVISÃO DO TEMPO · WEB &amp; APP</text>
</svg>
